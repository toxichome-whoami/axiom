syntax = "proto3";
package axiom.v1;

import "axiom/v1/db.proto";
import "axiom/v1/fs.proto";

service FederationService {
  // Database operations
  rpc ExecuteQuery(ExecuteQueryRequest) returns (ExecuteQueryResponse);
  rpc ListDatabases(ListDatabasesRequest) returns (ListDatabasesResponse);
  rpc ListTables(ListTablesRequest) returns (ListTablesResponse);

  // Storage operations
  rpc ListDirectory(ListDirectoryRequest) returns (stream FederationServiceListDirectoryResponse);
  rpc DownloadFile(DownloadFileRequest) returns (stream DownloadFileResponse);
  rpc UploadFile(stream UploadFileRequest) returns (UploadFileResponse);

  // Health & discovery
  rpc HealthCheck(HealthCheckRequest) returns (stream HealthCheckResponse);
  rpc GetNodeInfo(GetNodeInfoRequest) returns (GetNodeInfoResponse);
}

message HealthCheckRequest {
  string node_id = 1;
}

message HealthCheckResponse {
  NodeStatus status = 1;
  float latency_ms = 2;
  map<string, string> databases = 3;
  map<string, string> storages = 4;
}

enum NodeStatus {
  NODE_STATUS_UNSPECIFIED = 0;
  NODE_STATUS_UP = 1;
  NODE_STATUS_DEGRADED = 2;
  NODE_STATUS_DOWN = 3;
}

message ListDatabasesRequest {}

message ListDatabasesResponse {
  repeated DatabaseInfo databases = 1;
}

message DatabaseInfo {
  string name = 1;
  string engine = 2;
  string mode = 3;
  int32 tables_count = 4;
}

message ListTablesRequest {
  string db_alias = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message DownloadFileRequest {
  string storage_alias = 1;
  string path = 2;
}

message DownloadFileResponse {
  bytes data = 1;
}

message UploadFileRequest {
  string storage_alias = 1;
  string filename = 2;
  bytes data = 3;
  bool is_last = 4;
}

message GetNodeInfoRequest {}

message GetNodeInfoResponse {
  string node_id = 1;
  string version = 2;
  repeated string databases = 3;
  repeated string storages = 4;
}
