version: "3.9"

services:
    axiom:
        build: .
        ports:
            - "4500:4500" # HTTP / REST API
            - "4501:4501" # gRPC
        volumes:
            - ./config.toml:/app/config.toml
            - ./storage:/app/storage
            - ./logs:/app/logs
            - ./data:/app/data
        restart: unless-stopped
        depends_on:
            - redis

    redis:
        image: redis:7-alpine
        ports:
            - "6379:6379"
        command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
