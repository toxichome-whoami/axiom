version: "3.8"

services:
    # Redis handles distributed state for Rate Limiting, Caching, and Event Streams.
    redis:
        image: redis:7-alpine
        container_name: axiom_redis
        command: redis-server --save 60 1 --loglevel warning
        volumes:
            - redis_data:/data
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

    # Axiom — Rust native binary, no interpreter overhead
    axiom:
        build: .
        image: axiom:latest
        restart: unless-stopped
        volumes:
            - ./config.toml:/app/config.toml
            - ./storage:/app/storage
            - ./logs:/app/logs
            - ./data:/app/data
        environment:
            - RUST_LOG=info
        depends_on:
            redis:
                condition: service_healthy
        deploy:
            replicas: 3
            update_config:
                parallelism: 1
                delay: 10s
        # In production, do not expose ports directly to the host.
        # NGINX routes all external traffic to the replicas.
        expose:
            - "4500" # HTTP / REST API
            - "4501" # gRPC

    # NGINX Load Balancer — routes HTTP to :4500 and gRPC to :4501
    nginx:
        image: nginx:alpine
        container_name: axiom_lb
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf:ro
        ports:
            - "80:80"
            - "443:443"
        depends_on:
            - axiom
        restart: unless-stopped

volumes:
    redis_data:
